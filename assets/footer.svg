<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="footerAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7EE787;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00AA;stop-opacity:1" />
    </linearGradient>
    <filter id="footerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Card background (theme-safe: paints its own dark bg) -->
  <rect width="900" height="120" fill="url(#footerBg)" rx="12"/>
  <rect x="2" y="2" width="896" height="116" fill="none" stroke="#30363d" stroke-width="1" rx="11"/>

  <!-- Animated top divider line -->
  <line x1="200" y1="20" x2="700" y2="20" stroke="url(#footerAccent)" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="300;250;300" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="600;650;600" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Signature -->
  <text x="450" y="56" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold" filter="url(#footerGlow)" opacity="0">
    Rakibul Hasan · Rhasan@dev
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Tagline quote -->
  <text x="450" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#00FFAA" text-anchor="middle" font-style="italic" opacity="0">
    "Clean code + Relentless optimization + Robust DevOps = Flawless systems."
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="0.4s"/>
  </text>

  <!-- Social echoes -->
  <text x="450" y="106" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle" opacity="0">
    💻 GitHub  ·  💼 LinkedIn  ·  🐦 X  ·  ✉️ rbkhan00009@gmail.com  ·  📍 Dhaka, BD
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="0.8s"/>
  </text>
</svg>
