<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c6ffdd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbd786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7797d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="100" fill="url(#footerBg)" rx="10"/>
  
  <!-- Wave pattern -->
  <path d="M0,30 Q150,10 300,30 T600,30 T900,30 L900,0 L0,0 Z" fill="#00FFAA" opacity="0.08"/>
  <path d="M0,20 Q150,0 300,20 T600,20 T900,20 L900,0 L0,0 Z" fill="#FF00AA" opacity="0.06"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="50" r="15" fill="#00FFAA" opacity="0.15"/>
  <circle cx="800" cy="50" r="15" fill="#FF00AA" opacity="0.15"/>
  <circle cx="450" cy="50" r="20" fill="url(#footerGrad)" opacity="0.1"/>
  
  <!-- Main text -->
  <text x="450" y="45" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Crafting the Future of Web Development &amp; DevOps</text>
  
  <!-- Subtitle -->
  <text x="450" y="65" font-family="monospace" font-size="11" fill="#00FFAA" text-anchor="middle" opacity="0.7">Engineered with ❤️, ☕, and robust build chains in Dhaka, Bangladesh</text>
  
  <!-- Decorative line -->
  <line x1="300" y1="75" x2="600" y2="75" stroke="url(#footerGrad)" stroke-width="1" opacity="0.3"/>
</svg>