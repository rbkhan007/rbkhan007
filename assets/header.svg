<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heroName" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00AA;stop-opacity:1" />
    </linearGradient>
    <filter id="heroGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Card background (theme-safe: paints its own dark bg) -->
  <rect width="900" height="320" fill="url(#termBg)" rx="12"/>
  <rect x="2" y="2" width="896" height="316" fill="none" stroke="#30363d" stroke-width="1" rx="11"/>

  <!-- Terminal title bar -->
  <rect x="0" y="0" width="900" height="34" fill="#161b22" rx="12"/>
  <rect x="0" y="22" width="900" height="12" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#FF5F56"/>
  <circle cx="44" cy="17" r="6" fill="#FFBD2E"/>
  <circle cx="66" cy="17" r="6" fill="#27C93F"/>
  <text x="450" y="22" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">zsh — rakhan@github — ~/profile</text>

  <!-- Boot / prompt lines -->
  <g font-family="'Fira Code','JetBrains Mono',monospace" font-size="15">
    <text x="28" y="68" fill="#7EE787">$<tspan fill="#8b949e"> whoami</tspan><tspan fill="#C9D1D9">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.2s"/></tspan></text>
    <text x="48" y="90" fill="#C9D1D9" opacity="0">Rakibul Hasan — Full-Stack Developer &amp; AI/LLM Specialist
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.5s"/></text>

    <text x="28" y="120" fill="#7EE787" opacity="0">$<tspan fill="#8b949e"> cat focus.txt</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.9s"/></text>
    <text x="48" y="142" fill="#C9D1D9" opacity="0">RAG · LLM Orchestration · API Gateways · Secure DevOps
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.2s"/></text>

    <text x="28" y="172" fill="#7EE787" opacity="0">$<tspan fill="#8b949e"> stack --list</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.6s"/></text>
    <text x="48" y="194" fill="#C9D1D9" opacity="0">Next.js · TypeScript · Python · FastAPI · PostgreSQL · Docker
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.9s"/></text>

    <text x="28" y="224" fill="#7EE787" opacity="0">$<tspan fill="#8b949e"> status</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.3s"/></text>
    <text x="48" y="246" fill="#C9D1D9" opacity="0">● <tspan fill="#00FFAA" font-weight="bold">OPEN TO WORK</tspan> — Remote 🌍 · Dhaka, BD
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.6s"/></text>
  </g>

  <!-- Hero name with glow -->
  <text x="450" y="300" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="url(#heroName)" text-anchor="middle" font-weight="bold" filter="url(#heroGlow)" opacity="0">
    ~/rbkhan007
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="3s"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="28" y="252" width="9" height="15" fill="#7EE787" opacity="0">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" begin="2.8s"/>
  </rect>
</svg>
