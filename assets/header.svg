<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c6ffdd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbd786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7797d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00CC88;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF00AA;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#CC0088;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Animated particles -->
  <circle cx="50" cy="50" r="2" fill="#00FFAA" opacity="0.6">
    <animate attributeName="cy" values="50;40;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="30" r="1.5" fill="#FF00AA" opacity="0.5">
    <animate attributeName="cy" values="30;20;30" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="60" r="2" fill="#00FFAA" opacity="0.4">
    <animate attributeName="cy" values="60;50;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="40" r="1.5" fill="#FF00AA" opacity="0.5">
    <animate attributeName="cy" values="40;30;40" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="55" r="2" fill="#00FFAA" opacity="0.6">
    <animate attributeName="cy" values="55;45;55" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="35" r="1.5" fill="#FF00AA" opacity="0.4">
    <animate attributeName="cy" values="35;25;35" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Animated wave layers -->
  <path d="M0,150 Q150,120 300,150 T600,150 T900,150 L900,200 L0,200 Z" fill="url(#waveGrad1)">
    <animate attributeName="d" values="M0,150 Q150,120 300,150 T600,150 T900,150 L900,200 L0,200 Z;M0,155 Q150,125 300,155 T600,145 T900,155 L900,200 L0,200 Z;M0,150 Q150,120 300,150 T600,150 T900,150 L900,200 L0,200 Z" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M0,160 Q150,130 300,160 T600,160 T900,160 L900,200 L0,200 Z" fill="url(#waveGrad2)">
    <animate attributeName="d" values="M0,160 Q150,130 300,160 T600,160 T900,160 L900,200 L0,200 Z;M0,165 Q150,135 300,155 T600,165 T900,155 L900,200 L0,200 Z;M0,160 Q150,130 300,160 T600,160 T900,160 L900,200 L0,200 Z" dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M0,170 Q150,140 300,170 T600,170 T900,170 L900,200 L0,200 Z" fill="#00FFAA" opacity="0.05">
    <animate attributeName="d" values="M0,170 Q150,140 300,170 T600,170 T900,170 L900,200 L0,200 Z;M0,168 Q150,138 300,172 T600,168 T900,172 L900,200 L0,200 Z;M0,170 Q150,140 300,170 T600,170 T900,170 L900,200 L0,200 Z" dur="6s" repeatCount="indefinite"/>
  </path>
  
  <!-- Decorative circles with animation -->
  <circle cx="50" cy="50" r="30" fill="#00FFAA" opacity="0.1">
    <animate attributeName="r" values="30;35;30" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.15;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="50" r="25" fill="#FF00AA" opacity="0.1">
    <animate attributeName="r" values="25;30;25" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.15;0.1" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Rotating gear icon -->
  <g transform="translate(820, 160)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#00FFAA" stroke-width="1.5" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="#00FFAA" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Main title with glow -->
  <text x="450" y="75" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="url(#headerGrad)" text-anchor="middle" font-weight="bold" filter="url(#glow)">Rakibul Hasan</text>
  
  <!-- Subtitle -->
  <text x="450" y="110" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" filter="url(#softGlow)">Full-Stack Developer &amp; AI/LLM Specialist</text>
  
  <!-- Animated decorative line -->
  <line x1="250" y1="125" x2="650" y2="125" stroke="url(#headerGrad)" stroke-width="2" opacity="0.5">
    <animate attributeName="x1" values="250;280;250" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="650;620;650" dur="5s" repeatCount="indefinite"/>
  </line>
  
  <!-- Small decorative text -->
  <text x="450" y="145" font-family="monospace" font-size="12" fill="#00FFAA" text-anchor="middle" opacity="0.7">// Crafting the Future of Web Development &amp; DevOps</text>
  
  <!-- Animated orbiting dots -->
  <circle cx="100" cy="100" r="3" fill="#00FFAA" opacity="0.5">
    <animate attributeName="cx" values="100;120;100" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="100" r="3" fill="#FF00AA" opacity="0.5">
    <animate attributeName="cx" values="800;780;800" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;120;100" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>