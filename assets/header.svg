<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c6ffdd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbd786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7797d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Animated wave pattern -->
  <path d="M0,150 Q150,120 300,150 T600,150 T900,150 L900,200 L0,200 Z" fill="#00FFAA" opacity="0.1"/>
  <path d="M0,160 Q150,130 300,160 T600,160 T900,160 L900,200 L0,200 Z" fill="#FF00AA" opacity="0.08"/>
  <path d="M0,170 Q150,140 300,170 T600,170 T900,170 L900,200 L0,200 Z" fill="#00FFAA" opacity="0.05"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#00FFAA" opacity="0.15"/>
  <circle cx="850" cy="50" r="25" fill="#FF00AA" opacity="0.15"/>
  <circle cx="100" cy="150" r="20" fill="#FF00AA" opacity="0.1"/>
  <circle cx="800" cy="150" r="20" fill="#00FFAA" opacity="0.1"/>
  
  <!-- Main title -->
  <text x="450" y="75" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="url(#headerGrad)" text-anchor="middle" font-weight="bold">Rakibul Hasan</text>
  
  <!-- Subtitle -->
  <text x="450" y="110" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Senior Full-Stack Engineer &amp; DevOps Specialist</text>
  
  <!-- Decorative line -->
  <line x1="250" y1="125" x2="650" y2="125" stroke="url(#headerGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- Small decorative text -->
  <text x="450" y="145" font-family="monospace" font-size="12" fill="#00FFAA" text-anchor="middle" opacity="0.7">// Crafting the Future of Web Development &amp; DevOps</text>
</svg>