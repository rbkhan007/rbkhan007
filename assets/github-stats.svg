<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="statsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00AA;stop-opacity:1" />
    </linearGradient>
    <filter id="statsGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="400" height="220" fill="url(#statsGrad)" rx="10"/>
  <rect x="2" y="2" width="396" height="216" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>

  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" fill="#00FFAA" text-anchor="middle" font-weight="bold" filter="url(#statsGlow)">GitHub Stats</text>
  <line x1="120" y1="40" x2="280" y2="40" stroke="url(#accentGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Card 1: Repositories -->
  <g transform="translate(24, 58)">
    <rect width="168" height="64" rx="10" fill="#101a2b" stroke="#21262d" stroke-width="1"/>
    <text x="16" y="26" font-size="22">📦</text>
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="22" fill="#FF00AA" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">15+
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="16" y="50" font-family="Arial, sans-serif" font-size="11" fill="#8b949e">Repositories</text>
  </g>

  <!-- Card 2: Commits -->
  <g transform="translate(208, 58)">
    <rect width="168" height="64" rx="10" fill="#101a2b" stroke="#21262d" stroke-width="1"/>
    <text x="16" y="26" font-size="22">💎</text>
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="22" fill="#00FFAA" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">160+
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </text>
    <text x="16" y="50" font-family="Arial, sans-serif" font-size="11" fill="#8b949e">Commits / yr</text>
  </g>

  <!-- Card 3: AI Projects -->
  <g transform="translate(24, 134)">
    <rect width="168" height="64" rx="10" fill="#101a2b" stroke="#21262d" stroke-width="1"/>
    <text x="16" y="26" font-size="22">🤖</text>
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="22" fill="#00FFAA" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">5+
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </text>
    <text x="16" y="50" font-family="Arial, sans-serif" font-size="11" fill="#8b949e">AI Projects</text>
  </g>

  <!-- Card 4: Streak -->
  <g transform="translate(208, 134)">
    <rect width="168" height="64" rx="10" fill="#101a2b" stroke="#21262d" stroke-width="1"/>
    <text x="16" y="26" font-size="22">🔥</text>
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="22" fill="#FF6B6B" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">31
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </text>
    <text x="16" y="50" font-family="Arial, sans-serif" font-size="11" fill="#8b949e">Day Streak</text>
  </g>

  <!-- Open to work pill -->
  <g transform="translate(120, 200)">
    <rect width="160" height="18" rx="9" fill="#003b2e" stroke="#00FFAA" stroke-width="1"/>
    <text x="80" y="13" font-family="Arial, sans-serif" font-size="10" fill="#00FFAA" text-anchor="middle" font-weight="bold">● OPEN TO WORK</text>
  </g>
</svg>
