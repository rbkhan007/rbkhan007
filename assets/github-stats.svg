<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="statsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="url(#statsGrad)" rx="10"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="396" height="196" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>
  
  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" fill="#00FFAA" text-anchor="middle" font-weight="bold">GitHub Stats</text>
  
  <!-- Decorative line -->
  <line x1="50" y1="40" x2="350" y2="40" stroke="#30363d" stroke-width="1"/>
  
  <!-- Stats -->
  <text x="30" y="70" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">Total Stars:</text>
  <text x="370" y="70" font-family="Arial, sans-serif" font-size="14" fill="#FF00AA" text-anchor="end" font-weight="bold">0</text>
  
  <text x="30" y="100" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">Total Commits:</text>
  <text x="370" y="100" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="end" font-weight="bold">160+</text>
  
  <text x="30" y="130" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">PRs:</text>
  <text x="370" y="130" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="end" font-weight="bold">0</text>
  
  <text x="30" y="160" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">Issues:</text>
  <text x="370" y="160" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="end" font-weight="bold">0</text>
  
  <text x="30" y="190" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">Contributions:</text>
  <text x="370" y="190" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="end" font-weight="bold">Active</text>
</svg>