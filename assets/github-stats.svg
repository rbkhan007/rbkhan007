<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="statsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00AA;stop-opacity:1" />
    </linearGradient>
    <filter id="statsGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="url(#statsGrad)" rx="10"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="396" height="196" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>
  
  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" fill="#00FFAA" text-anchor="middle" font-weight="bold" filter="url(#statsGlow)">GitHub Stats</text>
  
  <!-- Decorative line -->
  <line x1="50" y1="40" x2="350" y2="40" stroke="url(#accentGrad)" stroke-width="1" opacity="0.5"/>
  
  <!-- Stats with animated icons -->
  <text x="30" y="70" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">Total Stars:</text>
  <text x="370" y="70" font-family="Arial, sans-serif" font-size="14" fill="#FF00AA" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">
    0
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <text x="30" y="100" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">Total Commits:</text>
  <text x="370" y="100" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">
    160+
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </text>
  
  <text x="30" y="130" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">PRs:</text>
  <text x="370" y="130" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">
    0
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </text>
  
  <text x="30" y="160" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">Issues:</text>
  <text x="370" y="160" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">
    0
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.9s"/>
  </text>
  
  <text x="30" y="190" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">Contributions:</text>
  <text x="370" y="190" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="end" font-weight="bold" filter="url(#statsGlow)">
    Active
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </text>
  
  <!-- Animated pulse decorations -->
  <circle cx="20" cy="20" r="3" fill="#00FFAA" opacity="0.3">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="180" r="3" fill="#FF00AA" opacity="0.3">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>