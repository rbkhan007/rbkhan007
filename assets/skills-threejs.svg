<svg xmlns="http://www.w3.org/2000/svg" width="600" height="40" viewBox="0 0 600 40">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF00AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0088;stop-opacity:1" />
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Card background -->
  <rect x="0" y="0" width="600" height="40" rx="10" fill="#0D1117" stroke="#30363d" stroke-width="1"/>

  <!-- Background track -->
  <rect x="15" y="13" width="560" height="14" rx="7" fill="#21262d"/>
  
  <!-- Animated fill bar -->
  <rect x="15" y="13" width="0" height="14" rx="7" fill="url(#grad4)" filter="url(#glow4)">
    <animate attributeName="width" from="0" to="448" dur="1.5s" fill="freeze" begin="1.1s"/>
  </rect>

  <!-- Shimmer effect -->
  <rect x="15" y="13" width="60" height="14" rx="7" fill="url(#shimmer4)" opacity="0.3">
    <animate attributeName="x" from="-45" to="575" dur="2s" repeatCount="indefinite" begin="2.6s"/>
  </rect>

  <!-- Label -->
  <text x="24" y="23" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" opacity="0">
    3D WebGraphics (Three.js Engine)
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.9s"/>
  </text>

  <!-- Percentage -->
  <text x="582" y="23" font-family="Arial, sans-serif" font-size="10" fill="#FF00AA" font-weight="bold" text-anchor="end" opacity="0">
    80%
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.4s"/>
  </text>
  
  <defs>
    <linearGradient id="shimmer4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>