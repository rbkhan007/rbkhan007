<svg xmlns="http://www.w3.org/2000/svg" width="600" height="80" viewBox="0 0 600 80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00CC88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00AA;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="80" fill="url(#bgGrad)" rx="8"/>
  
  <!-- Terminal dots -->
  <circle cx="20" cy="15" r="5" fill="#FF5F56"/>
  <circle cx="40" cy="15" r="5" fill="#FFBD2E"/>
  <circle cx="60" cy="15" r="5" fill="#27C93F"/>
  
  <!-- Terminal title bar -->
  <line x1="70" y1="15" x2="580" y2="15" stroke="#21262d" stroke-width="1"/>
  
  <!-- Greeting line 1 -->
  <text x="25" y="40" font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#8b949e">$</text>
  <text x="40" y="40" font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="#00FFAA" filter="url(#glow)">Hello World!</text>
  
  <!-- Name line -->
  <text x="25" y="58" font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#8b949e">$</text>
  <text x="40" y="58" font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="13" fill="url(#textGrad)" filter="url(#glow)">I'm Rakibul Hasan</text>
  
  <!-- Cursor block -->
  <rect x="215" y="47" width="8" height="15" fill="#00FFAA" rx="1"/>
  
  <!-- Subtitle -->
  <text x="25" y="74" font-family="'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="11" fill="#58a6ff">// Senior Full-Stack Engineer &amp; DevOps Specialist</text>
</svg>