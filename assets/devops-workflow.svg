<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC88;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2088FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3178C6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A5276;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EE5A5A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradE" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2496ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333;stop-opacity:1" />
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="arrowGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00FFAA"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#0D1117" rx="10"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#21262d" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="18" fill="#00FFAA" text-anchor="middle" font-weight="bold" filter="url(#nodeGlow)">DevOps &amp; Full-Stack Workflow</text>
  
  <!-- Node A: Code Push -->
  <rect x="50" y="60" width="140" height="50" rx="25" fill="url(#gradA)" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.5s"/>
  </rect>
  <text x="120" y="90" font-family="Arial, sans-serif" font-size="13" fill="#0D1117" text-anchor="middle" font-weight="bold">Code Push</text>
  
  <!-- Arrow A->B -->
  <line x1="190" y1="85" x2="230" y2="85" stroke="#00FFAA" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1s"/>
  </line>
  
  <!-- Node B: GitHub Actions CI -->
  <rect x="230" y="60" width="160" height="50" rx="25" fill="url(#gradB)" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.2s"/>
  </rect>
  <text x="310" y="90" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">GitHub Actions CI</text>
  
  <!-- Arrow B->C -->
  <line x1="390" y1="85" x2="430" y2="85" stroke="#00FFAA" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.7s"/>
  </line>
  
  <!-- Node C: Lint & Test -->
  <rect x="430" y="60" width="140" height="50" rx="25" fill="url(#gradC)" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.9s"/>
  </rect>
  <text x="500" y="90" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Lint &amp; Test</text>
  
  <!-- Arrow C->D -->
  <line x1="570" y1="85" x2="610" y2="85" stroke="#00FFAA" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.4s"/>
  </line>
  
  <!-- Node D: Tests Pass? (Diamond) -->
  <polygon points="680,50 750,85 680,120 610,85" fill="#FFD93D" stroke="#F4C430" stroke-width="2" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.6s"/>
  </polygon>
  <text x="680" y="90" font-family="Arial, sans-serif" font-size="12" fill="#0D1117" text-anchor="middle" font-weight="bold">Tests Pass?</text>
  
  <!-- Arrow D->E (Yes) -->
  <line x1="680" y1="120" x2="680" y2="160" stroke="#00FFAA" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="3.1s"/>
  </line>
  <text x="695" y="145" font-family="Arial, sans-serif" font-size="11" fill="#00FFAA" opacity="0">
    Yes
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="3.1s"/>
  </text>
  
  <!-- Arrow D->F (No) -->
  <line x1="610" y1="85" x2="530" y2="85" stroke="#FF6B6B" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="3.1s"/>
  </line>
  <text x="570" y="78" font-family="Arial, sans-serif" font-size="11" fill="#FF6B6B" opacity="0">
    No
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="3.1s"/>
  </text>
  
  <!-- Node F: Notify Developer -->
  <rect x="430" y="120" width="160" height="50" rx="25" fill="url(#gradD)" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="3.3s"/>
  </rect>
  <text x="510" y="150" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Notify Developer</text>
  
  <!-- Node E: Build Docker Image -->
  <rect x="610" y="160" width="160" height="50" rx="25" fill="url(#gradE)" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="3.5s"/>
  </rect>
  <text x="690" y="190" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Build Docker Image</text>
  
  <!-- Arrow E->G -->
  <line x1="690" y1="210" x2="690" y2="250" stroke="#00FFAA" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="4s"/>
  </line>
  
  <!-- Node G: Push to Registry -->
  <rect x="610" y="250" width="160" height="50" rx="25" fill="url(#gradF)" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="4.2s"/>
  </rect>
  <text x="690" y="280" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Push to Registry</text>
  
  <!-- Arrow G->H -->
  <line x1="610" y1="275" x2="350" y2="275" stroke="#00FFAA" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="4.7s"/>
  </line>
  
  <!-- Node H: Deploy to Vercel/Cloud -->
  <rect x="170" y="250" width="180" height="50" rx="25" fill="url(#gradF)" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="4.9s"/>
  </rect>
  <text x="260" y="280" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Deploy to Vercel/Cloud</text>
  
  <!-- Arrow H->I -->
  <line x1="260" y1="300" x2="260" y2="340" stroke="#00FFAA" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#arrowGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="5.4s"/>
  </line>
  
  <!-- Node I: Production Ready -->
  <rect x="170" y="340" width="180" height="45" rx="22" fill="url(#gradA)" filter="url(#nodeGlow)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="5.6s"/>
    <animate attributeName="fill" values="#00FFAA;#00CC88;#00FFAA" dur="2s" repeatCount="indefinite" begin="6s"/>
  </rect>
  <text x="260" y="368" font-family="Arial, sans-serif" font-size="13" fill="#0D1117" text-anchor="middle" font-weight="bold">Production Ready</text>
  
  <!-- Animated pulse on final node -->
  <circle cx="260" cy="362" r="20" fill="#00FFAA" opacity="0">
    <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite" begin="6s"/>
    <animate attributeName="r" values="20;35;20" dur="2s" repeatCount="indefinite" begin="6s"/>
  </circle>
  
  <!-- Moving particle along path -->
  <circle r="4" fill="#00FFAA" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
    <animateMotion path="M120,85 L310,85 L500,85 L680,85 L680,185 L690,275 L260,275 L260,362" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>