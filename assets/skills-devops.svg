<svg xmlns="http://www.w3.org/2000/svg" width="600" height="35" viewBox="0 0 600 35">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background track -->
  <rect x="0" y="10" width="600" height="15" rx="7" fill="#21262d"/>
  
  <!-- Animated fill bar -->
  <rect x="0" y="10" width="0" height="15" rx="7" fill="url(#grad5)" filter="url(#glow5)">
    <animate attributeName="width" from="0" to="540" dur="1.5s" fill="freeze" begin="1.3s"/>
  </rect>
  
  <!-- Shimmer effect -->
  <rect x="0" y="10" width="60" height="15" rx="7" fill="url(#shimmer5)" opacity="0.3">
    <animate attributeName="x" from="-60" to="600" dur="2s" repeatCount="indefinite" begin="2.8s"/>
  </rect>
  
  <!-- Label -->
  <text x="15" y="21" font-family="Arial, sans-serif" font-size="11" fill="#0D1117" font-weight="bold" opacity="0">
    DevOps &amp; Automated CI/CD Pipelines
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.1s"/>
  </text>
  
  <!-- Percentage -->
  <text x="565" y="21" font-family="Arial, sans-serif" font-size="10" fill="#0D1117" font-weight="bold" text-anchor="end" opacity="0">
    90%
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.6s"/>
  </text>
  
  <defs>
    <linearGradient id="shimmer5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>