<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="activityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00FFAA;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00AA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
