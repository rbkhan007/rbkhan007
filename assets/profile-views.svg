<svg xmlns="http://www.w3.org/2000/svg" width="200" height="35" viewBox="0 0 200 35">
  <defs>
    <linearGradient id="viewGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:1" />
    </linearGradient>
    <filter id="viewGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="35" fill="url(#viewGrad)" rx="5" filter="url(#viewGlow)"/>
  
  <!-- Animated shine effect -->
  <rect x="0" y="0" width="200" height="35" fill="url(#shine)" rx="5" opacity="0.3">
    <animate attributeName="x" from="-200" to="200" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Text -->
  <text x="100" y="22" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">
    Profile Views: 0
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <defs>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>