    </rect>
    <rect x="270" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" fill="freeze" begin="2.8s"/>
    </rect>
    <rect x="280" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" fill="freeze" begin="2.9s"/>
    </rect>
    <rect x="290" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
