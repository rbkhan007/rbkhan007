<svg xmlns="http://www.w3.org/2000/svg" width="450" height="180" viewBox="0 0 450 180">
  <defs>
    <linearGradient id="streakGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF00AA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    <filter id="streakGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="450" height="180" fill="url(#streakGrad)" rx="10"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="446" height="176" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>
  
  <!-- Title -->
  <text x="225" y="30" font-family="Arial, sans-serif" font-size="14" fill="#FF00AA" text-anchor="middle" font-weight="bold" filter="url(#streakGlow)">GitHub Streak</text>
  
  <!-- Current Streak -->
  <text x="150" y="65" font-family="Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Current Streak</text>
  <text x="150" y="95" font-family="Arial, sans-serif" font-size="28" fill="#00FFAA" text-anchor="middle" font-weight="bold" filter="url(#streakGlow)">
    0
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="150" y="110" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">days</text>
  
  <!-- Fire icon animation -->
  <text x="150" y="130" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="url(#fireGrad)">
    🔥
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
  </text>
  
  <!-- Longest Streak -->
  <text x="300" y="65" font-family="Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Longest Streak</text>
  <text x="300" y="95" font-family="Arial, sans-serif" font-size="28" fill="#FF00AA" text-anchor="middle" font-weight="bold" filter="url(#streakGlow)">
    0
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </text>
  <text x="300" y="110" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">days</text>
  
  <!-- Star icon animation -->
  <text x="300" y="130" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">
    ⭐
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
  </text>
  
  <!-- Divider with animation -->
  <line x1="225" y1="50" x2="225" y2="120" stroke="#30363d" stroke-width="1">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Contribution Graph -->
  <text x="225" y="145" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">160+ contributions in the last year</text>
  
  <!-- Activity dots with staggered animation -->
  <g transform="translate(70, 155)">
    <rect x="0" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" fill="freeze" begin="0.1s"/>
    </rect>
    <rect x="10" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" fill="freeze" begin="0.2s"/>
    </rect>
    <rect x="20" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" fill="freeze" begin="0.3s"/>
    </rect>
    <rect x="30" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" fill="freeze" begin="0.4s"/>
    </rect>
    <rect x="40" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
