    </rect>
    <rect x="90" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.2s" fill="freeze" begin="1s"/>
    </rect>
    <rect x="100" y="0" width="6" height="6" fill="#0D1117" rx="1" opacity="0">
