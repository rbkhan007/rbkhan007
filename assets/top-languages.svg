<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="langGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="url(#langGrad)" rx="10"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="396" height="196" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>
  
  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="middle" font-weight="bold">Top Languages</text>
  
  <!-- Language bars -->
  <g transform="translate(30, 50)">
    <!-- TypeScript -->
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">TypeScript</text>
    <rect x="100" y="2" width="220" height="14" fill="#222" rx="7"/>
    <rect x="100" y="2" width="200" height="14" fill="#3178C6" rx="7"/>
    <text x="325" y="13" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">55%</text>
    
    <!-- JavaScript -->
    <text x="0" y="42" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">JavaScript</text>
    <rect x="100" y="32" width="220" height="14" fill="#222" rx="7"/>
    <rect x="100" y="32" width="150" height="14" fill="#F7DF1E" rx="7"/>
    <text x="325" y="43" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">25%</text>
    
    <!-- Python -->
    <text x="0" y="72" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Python</text>
    <rect x="100" y="62" width="220" height="14" fill="#222" rx="7"/>
    <rect x="100" y="62" width="80" height="14" fill="#3776AB" rx="7"/>
    <text x="325" y="73" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">10%</text>
    
    <!-- HTML/CSS -->
    <text x="0" y="102" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">HTML/CSS</text>
    <rect x="100" y="92" width="220" height="14" fill="#222" rx="7"/>
    <rect x="100" y="92" width="55" height="14" fill="#E34F26" rx="7"/>
    <text x="325" y="103" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">7%</text>
    
    <!-- Other -->
    <text x="0" y="132" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Other</text>
    <rect x="100" y="122" width="220" height="14" fill="#222" rx="7"/>
    <rect x="100" y="122" width="35" height="14" fill="#00FFAA" rx="7"/>
    <text x="325" y="133" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">3%</text>
  </g>
  
  <!-- Color dots -->
  <circle cx="30" cy="185" r="4" fill="#3178C6"/>
  <text x="40" y="189" font-family="Arial, sans-serif" font-size="9" fill="#8b949e">TypeScript</text>
  <circle cx="130" cy="185" r="4" fill="#F7DF1E"/>
  <text x="140" y="189" font-family="Arial, sans-serif" font-size="9" fill="#8b949e">JavaScript</text>
  <circle cx="230" cy="185" r="4" fill="#3776AB"/>
  <text x="240" y="189" font-family="Arial, sans-serif" font-size="9" fill="#8b949e">Python</text>
  <circle cx="300" cy="185" r="4" fill="#E34F26"/>
  <text x="310" y="189" font-family="Arial, sans-serif" font-size="9" fill="#8b949e">HTML</text>
  <circle cx="350" cy="185" r="4" fill="#00FFAA"/>
  <text x="360" y="189" font-family="Arial, sans-serif" font-size="9" fill="#8b949e">Other</text>
</svg>