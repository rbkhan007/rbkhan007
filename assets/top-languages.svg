<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="langGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="200" fill="url(#langGrad)" rx="10"/>
  <rect x="2" y="2" width="396" height="196" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>

  <text x="200" y="30" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="middle" font-weight="bold">Top Languages</text>

  <g transform="translate(30, 55)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">TypeScript</text>
    <rect x="110" y="2" width="210" height="14" fill="#21262d" rx="7"/>
    <rect x="110" y="2" width="189" height="14" fill="#3178C6" rx="7"><animate attributeName="width" from="0" to="189" dur="1.2s" fill="freeze" begin="0.3s"/></rect>
    <text x="330" y="13" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">90%</text>

    <text x="0" y="42" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Python</text>
    <rect x="110" y="32" width="210" height="14" fill="#21262d" rx="7"/>
    <rect x="110" y="32" width="126" height="14" fill="#3776AB" rx="7"><animate attributeName="width" from="0" to="126" dur="1.2s" fill="freeze" begin="0.5s"/></rect>
    <text x="330" y="43" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">60%</text>

    <text x="0" y="72" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">JavaScript</text>
    <rect x="110" y="62" width="210" height="14" fill="#21262d" rx="7"/>
    <rect x="110" y="62" width="84" height="14" fill="#F7DF1E" rx="7"><animate attributeName="width" from="0" to="84" dur="1.2s" fill="freeze" begin="0.7s"/></rect>
    <text x="330" y="73" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">40%</text>

    <text x="0" y="102" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">HTML/CSS</text>
    <rect x="110" y="92" width="210" height="14" fill="#21262d" rx="7"/>
    <rect x="110" y="92" width="63" height="14" fill="#E34F26" rx="7"><animate attributeName="width" from="0" to="63" dur="1.2s" fill="freeze" begin="0.9s"/></rect>
    <text x="330" y="103" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">30%</text>

    <text x="0" y="132" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Other</text>
    <rect x="110" y="122" width="210" height="14" fill="#21262d" rx="7"/>
    <rect x="110" y="122" width="42" height="14" fill="#00FFAA" rx="7"><animate attributeName="width" from="0" to="42" dur="1.2s" fill="freeze" begin="1.1s"/></rect>
    <text x="330" y="133" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">20%</text>
  </g>

  <text x="200" y="185" font-family="Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Based on recent public repositories</text>
</svg>
