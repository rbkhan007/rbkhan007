<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="langGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="donutGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="400" height="200" fill="url(#langGrad)" rx="10"/>
  <rect x="2" y="2" width="396" height="196" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>

  <text x="200" y="28" font-family="Arial, sans-serif" font-size="14" fill="#00FFAA" text-anchor="middle" font-weight="bold">Top Languages</text>

  <g transform="translate(95, 112)" filter="url(#donutGlow)">
    <circle r="52" cx="0" cy="0" fill="none" stroke="#21262d" stroke-width="20"/>
    <circle r="52" cx="0" cy="0" fill="none" stroke="#3178C6" stroke-width="20"
            stroke-dasharray="135 360" stroke-dashoffset="0" transform="rotate(-90)" stroke-linecap="butt"><animate attributeName="stroke-dasharray" from="0 360" to="135 360" dur="1s" fill="freeze" begin="0.2s"/></circle>
    <circle r="52" cx="0" cy="0" fill="none" stroke="#3776AB" stroke-width="20"
            stroke-dasharray="90 360" stroke-dashoffset="-135" transform="rotate(-90)" stroke-linecap="butt"><animate attributeName="stroke-dasharray" from="0 360" to="90 360" dur="1s" fill="freeze" begin="0.4s"/></circle>
    <circle r="52" cx="0" cy="0" fill="none" stroke="#F7DF1E" stroke-width="20"
            stroke-dasharray="60 360" stroke-dashoffset="-225" transform="rotate(-90)" stroke-linecap="butt"><animate attributeName="stroke-dasharray" from="0 360" to="60 360" dur="1s" fill="freeze" begin="0.6s"/></circle>
    <circle r="52" cx="0" cy="0" fill="none" stroke="#E34F26" stroke-width="20"
            stroke-dasharray="45 360" stroke-dashoffset="-285" transform="rotate(-90)" stroke-linecap="butt"><animate attributeName="stroke-dasharray" from="0 360" to="45 360" dur="1s" fill="freeze" begin="0.8s"/></circle>
    <circle r="52" cx="0" cy="0" fill="none" stroke="#00FFAA" stroke-width="20"
            stroke-dasharray="30 360" stroke-dashoffset="-330" transform="rotate(-90)" stroke-linecap="butt"><animate attributeName="stroke-dasharray" from="0 360" to="30 360" dur="1s" fill="freeze" begin="1s"/></circle>
    <text x="0" y="-3" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">TS</text>
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">90% top</text>
  </g>

  <g transform="translate(195, 60)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="11" height="11" rx="3" fill="#3178C6"/>
    <text x="18" y="10" font-size="11" fill="#FFFFFF">TypeScript</text>
    <text x="190" y="10" font-size="11" fill="#8b949e" text-anchor="end" font-weight="bold">90%</text>
    <rect x="0" y="22" width="11" height="11" rx="3" fill="#3776AB"/>
    <text x="18" y="32" font-size="11" fill="#FFFFFF">Python</text>
    <text x="190" y="32" font-size="11" fill="#8b949e" text-anchor="end" font-weight="bold">60%</text>
    <rect x="0" y="44" width="11" height="11" rx="3" fill="#F7DF1E"/>
    <text x="18" y="54" font-size="11" fill="#FFFFFF">JavaScript</text>
    <text x="190" y="54" font-size="11" fill="#8b949e" text-anchor="end" font-weight="bold">40%</text>
    <rect x="0" y="66" width="11" height="11" rx="3" fill="#E34F26"/>
    <text x="18" y="76" font-size="11" fill="#FFFFFF">HTML/CSS</text>
    <text x="190" y="76" font-size="11" fill="#8b949e" text-anchor="end" font-weight="bold">30%</text>
    <rect x="0" y="88" width="11" height="11" rx="3" fill="#00FFAA"/>
    <text x="18" y="98" font-size="11" fill="#FFFFFF">Other</text>
    <text x="190" y="98" font-size="11" fill="#8b949e" text-anchor="end" font-weight="bold">20%</text>
  </g>

  <text x="200" y="190" font-family="Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Based on recent public repositories</text>
</svg>
