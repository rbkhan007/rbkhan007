<svg xmlns="http://www.w3.org/2000/svg" width="800" height="100" viewBox="0 0 800 100">
  <defs>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="100" fill="#0D1117" rx="10"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="796" height="96" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>
  
  <!-- Title -->
  <text x="400" y="25" font-family="Arial, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Trophy Case</text>
  
  <!-- Trophy icons -->
  <g transform="translate(50, 35)">
    <!-- Trophy 1 -->
    <text x="0" y="30" font-size="30">🏆</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Stars</text>
  </g>
  
  <g transform="translate(150, 35)">
    <!-- Trophy 2 -->
    <text x="0" y="30" font-size="30">⭐</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Commits</text>
  </g>
  
  <g transform="translate(250, 35)">
    <!-- Trophy 3 -->
    <text x="0" y="30" font-size="30">🔥</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Streak</text>
  </g>
  
  <g transform="translate(350, 35)">
    <!-- Trophy 4 -->
    <text x="0" y="30" font-size="30">💎</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">PRs</text>
  </g>
  
  <g transform="translate(450, 35)">
    <!-- Trophy 5 -->
    <text x="0" y="30" font-size="30">🎯</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Issues</text>
  </g>
  
  <g transform="translate(550, 35)">
    <!-- Trophy 6 -->
    <text x="0" y="30" font-size="30">🚀</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Reviews</text>
  </g>
  
  <g transform="translate(650, 35)">
    <!-- Trophy 7 -->
    <text x="0" y="30" font-size="30">💡</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Insights</text>
  </g>
</svg>