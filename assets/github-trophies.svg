<svg xmlns="http://www.w3.org/2000/svg" width="800" height="100" viewBox="0 0 800 100">
  <defs>
    <linearGradient id="trophyBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="trophyGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="800" height="100" fill="url(#trophyBg)" rx="10"/>
  <rect x="2" y="2" width="796" height="96" fill="none" stroke="#30363d" stroke-width="1" rx="9"/>

  <text x="400" y="22" font-family="Arial, sans-serif" font-size="12" fill="#FFD700" text-anchor="middle" font-weight="bold" filter="url(#trophyGlow)">🏆 Trophy Case</text>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(100, 52)">
      <text y="0" font-size="22">⭐</text>
      <text y="20" font-size="11" fill="#FFD700" font-weight="bold">15+</text>
      <text y="34" font-size="9" fill="#8b949e">Stars</text>
    </g>
    <g transform="translate(233, 52)">
      <text y="0" font-size="22">🔥</text>
      <text y="20" font-size="11" fill="#FF6B6B" font-weight="bold">31</text>
      <text y="34" font-size="9" fill="#8b949e">Streak</text>
    </g>
    <g transform="translate(366, 52)">
      <text y="0" font-size="22">💎</text>
      <text y="20" font-size="11" fill="#00FFAA" font-weight="bold">160+</text>
      <text y="34" font-size="9" fill="#8b949e">Commits</text>
    </g>
    <g transform="translate(499, 52)">
      <text y="0" font-size="22">🚀</text>
      <text y="20" font-size="11" fill="#58a6ff" font-weight="bold">6</text>
      <text y="34" font-size="9" fill="#8b949e">Repos</text>
    </g>
    <g transform="translate(632, 52)">
      <text y="0" font-size="22">🎯</text>
      <text y="20" font-size="11" fill="#FF00AA" font-weight="bold">5+</text>
      <text y="34" font-size="9" fill="#8b949e">AI Apps</text>
    </g>
  </g>
</svg>
