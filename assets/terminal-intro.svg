<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="200" fill="url(#termGrad)" rx="8"/>
  
  <!-- Terminal border -->
  <rect x="2" y="2" width="596" height="196" fill="none" stroke="#414868" stroke-width="1" rx="7"/>
  
  <!-- Terminal dots -->
  <circle cx="20" cy="15" r="5" fill="#F7768E"/>
  <circle cx="40" cy="15" r="5" fill="#E0AF68"/>
  <circle cx="60" cy="15" r="5" fill="#9ECE6A"/>
  
  <!-- Terminal title -->
  <text x="300" y="18" font-family="monospace" font-size="10" fill="#565f89" text-anchor="middle">zsh - rbkhan007@github</text>
  
  <!-- Terminal content -->
  <text x="20" y="50" font-family="'Fira Code', monospace" font-size="12" fill="#9ECE6A">$</text>
  <text x="35" y="50" font-family="'Fira Code', monospace" font-size="12" fill="#C0CAF5">git clone https://github.com/rbkhan007</text>
  
  <text x="20" y="75" font-family="'Fira Code', monospace" font-size="12" fill="#9ECE6A">$</text>
  <text x="35" y="75" font-family="'Fira Code', monospace" font-size="12" fill="#C0CAF5">cd rbkhan007</text>
  
  <text x="20" y="100" font-family="'Fira Code', monospace" font-size="12" fill="#9ECE6A">$</text>
  <text x="35" y="100" font-family="'Fira Code', monospace" font-size="12" fill="#C0CAF5">cat skills.json</text>
  
  <!-- JSON output -->
  <text x="35" y="125" font-family="'Fira Code', monospace" font-size="11" fill="#FF9E64">{</text>
  <text x="55" y="140" font-family="'Fira Code', monospace" font-size="11" fill="#7DCFFF">"name"</text>
  <text x="105" y="140" font-family="'Fira Code', monospace" font-size="11" fill="#C0CAF5">: "Rakibul Hasan",</text>
  <text x="55" y="155" font-family="'Fira Code', monospace" font-size="11" fill="#7DCFFF">"role"</text>
  <text x="105" y="155" font-family="'Fira Code', monospace" font-size="11" fill="#C0CAF5">: "Full-Stack + DevOps",</text>
  <text x="55" y="170" font-family="'Fira Code', monospace" font-size="11" fill="#7DCFFF">"status"</text>
  <text x="115" y="170" font-family="'Fira Code', monospace" font-size="11" fill="#C0CAF5">: "Ready to build!"</text>
  <text x="35" y="185" font-family="'Fira Code', monospace" font-size="11" fill="#FF9E64">}</text>
  
  <!-- Blinking cursor -->
  <rect x="20" y="188" width="8" height="12" fill="#9ECE6A">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>