<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ECE6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7DCFFF;stop-opacity:1" />
    </linearGradient>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="200" fill="url(#termGrad)" rx="8"/>
  
  <!-- Terminal border -->
  <rect x="2" y="2" width="596" height="196" fill="none" stroke="#414868" stroke-width="1" rx="7"/>
  
  <!-- Terminal dots with glow -->
  <circle cx="20" cy="15" r="5" fill="#F7768E" filter="url(#termGlow)">
    <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="15" r="5" fill="#E0AF68" filter="url(#termGlow)">
    <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="60" cy="15" r="5" fill="#9ECE6A" filter="url(#termGlow)">
    <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  
  <!-- Terminal title -->
  <text x="300" y="18" font-family="monospace" font-size="10" fill="#565f89" text-anchor="middle">zsh - rbkhan007@github</text>
  
  <!-- Terminal content with typing animation -->
  <text x="20" y="50" font-family="'Fira Code', monospace" font-size="12" fill="#9ECE6A" filter="url(#termGlow)">$</text>
  <text x="35" y="50" font-family="'Fira Code', monospace" font-size="12" fill="#C0CAF5">
    <tspan opacity="0">git clone https://github.com/rbkhan007</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze"/>
  </text>
  
  <text x="20" y="75" font-family="'Fira Code', monospace" font-size="12" fill="#9ECE6A" filter="url(#termGlow)">
    <tspan opacity="0">$</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.8s" fill="freeze"/>
  </text>
  <text x="35" y="75" font-family="'Fira Code', monospace" font-size="12" fill="#C0CAF5">
    <tspan opacity="0">cd rbkhan007</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
  </text>
  
  <text x="20" y="100" font-family="'Fira Code', monospace" font-size="12" fill="#9ECE6A" filter="url(#termGlow)">
    <tspan opacity="0">$</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.3s" fill="freeze"/>
  </text>
  <text x="35" y="100" font-family="'Fira Code', monospace" font-size="12" fill="#C0CAF5">
    <tspan opacity="0">cat skills.json</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
  </text>
  
  <!-- JSON output with syntax highlighting -->
  <text x="35" y="125" font-family="'Fira Code', monospace" font-size="11" fill="#FF9E64">
    <tspan opacity="0">{</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.8s" fill="freeze"/>
  </text>
  
  <text x="55" y="140" font-family="'Fira Code', monospace" font-size="11" fill="#7DCFFF">
    <tspan opacity="0">"name"</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
  </text>
  <text x="105" y="140" font-family="'Fira Code', monospace" font-size="11" fill="#C0CAF5">
    <tspan opacity="0">: "Rakibul Hasan",</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.1s" fill="freeze"/>
  </text>
  
  <text x="55" y="155" font-family="'Fira Code', monospace" font-size="11" fill="#7DCFFF">
    <tspan opacity="0">"role"</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
  </text>
  <text x="105" y="155" font-family="'Fira Code', monospace" font-size="11" fill="#C0CAF5">
    <tspan opacity="0">: "Full-Stack + DevOps",</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.4s" fill="freeze"/>
  </text>
  
  <text x="55" y="170" font-family="'Fira Code', monospace" font-size="11" fill="#7DCFFF">
    <tspan opacity="0">"status"</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.6s" fill="freeze"/>
  </text>
  <text x="115" y="170" font-family="'Fira Code', monospace" font-size="11" fill="#C0CAF5">
    <tspan opacity="0">: "Ready to build!"</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.7s" fill="freeze"/>
  </text>
  
  <text x="35" y="185" font-family="'Fira Code', monospace" font-size="11" fill="#FF9E64">
    <tspan opacity="0">}</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.9s" fill="freeze"/>
  </text>
  
  <!-- Blinking cursor -->
  <rect x="20" y="188" width="8" height="12" fill="#9ECE6A" filter="url(#termGlow)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>