<svg xmlns="http://www.w3.org/2000/svg" width="600" height="40" viewBox="0 0 600 40">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Card background -->
  <rect x="0" y="0" width="600" height="40" rx="10" fill="#0D1117" stroke="#30363d" stroke-width="1"/>

  <!-- Background track -->
  <rect x="15" y="13" width="560" height="14" rx="7" fill="#21262d"/>
  
  <!-- Animated fill bar -->
  <rect x="15" y="13" width="0" height="14" rx="7" fill="url(#grad1)" filter="url(#glow1)">
    <animate attributeName="width" from="0" to="532" dur="1.5s" fill="freeze" begin="0.5s"/>
  </rect>

  <!-- Shimmer effect -->
  <rect x="15" y="13" width="60" height="14" rx="7" fill="url(#shimmer1)" opacity="0.3">
    <animate attributeName="x" from="-45" to="575" dur="2s" repeatCount="indefinite" begin="2s"/>
  </rect>

  <!-- Label -->
  <text x="24" y="23" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold" opacity="0">
    Next.js &amp; App Router
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.3s"/>
  </text>

  <!-- Percentage -->
  <text x="582" y="23" font-family="Arial, sans-serif" font-size="10" fill="#00FFAA" font-weight="bold" text-anchor="end" opacity="0">
    95%
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.8s"/>
  </text>

  <!-- Glow effect on bar -->
  <rect x="532" y="13" width="15" height="14" rx="7" fill="#00FFAA" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="0.5s" fill="freeze" begin="2s"/>
  </rect>
  
  <defs>
    <linearGradient id="shimmer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>