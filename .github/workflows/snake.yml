name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # snake output branch is main (profile repo)

      - name: Generate github-contribution-grid-snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: rbkhan007
          outputs: |
            assets/snake.svg
            assets/snake-dark.svg?palette=github-dark

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add assets/snake.svg assets/snake-dark.svg
            git commit -m "chore: update contribution snake"
            git push
          else
            echo "No changes"
          fi
